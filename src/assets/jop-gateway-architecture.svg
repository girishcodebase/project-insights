<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>jop-gateway-service architecture</title>
  <desc>A client sends a request to jop-gateway-service on port 9985. The gateway reads routing and resilience limits from Zookeeper, then passes the request through resilience filters. If checks pass, the request goes to the downstream service; if a check fails, it goes to the fallback controller instead.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
    .leader { stroke: #999; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="340" y1="100" x2="340" y2="146" class="arr" marker-end="url(#arrow)"/>
  <path d="M460 108 L422 150" class="leader" marker-end="url(#arrow)"/>
  <line x1="340" y1="210" x2="340" y2="286" class="arr" marker-end="url(#arrow)"/>
  <path d="M303 350 L237 406" class="arr" marker-end="url(#arrow)"/>
  <path d="M377 350 L443 406" class="arr" marker-end="url(#arrow)"/>

  <g>
    <rect x="245" y="40" width="190" height="60" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
    <text x="340" y="63" text-anchor="middle" class="th" fill="#2c2c2a">Client</text>
    <text x="340" y="80" text-anchor="middle" class="ts" fill="#5f5e5a">Merchant app / browser</text>
  </g>

  <g>
    <rect x="460" y="40" width="175" height="68" rx="4" fill="none" stroke="#b4b2a9" stroke-dasharray="4 3"/>
    <text x="547" y="63" text-anchor="middle" class="th" fill="#2c2c2a">Zookeeper</text>
    <text x="547" y="80" text-anchor="middle" class="ts" fill="#5f5e5a">config-properties</text>
    <text x="547" y="96" text-anchor="middle" class="ts" fill="#5f5e5a">resilience-properties</text>
  </g>

  <g>
    <rect x="245" y="150" width="190" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
    <text x="340" y="173" text-anchor="middle" class="th" fill="#0c447c">jop-gateway-service</text>
    <text x="340" y="190" text-anchor="middle" class="ts" fill="#185fa5">:9985 &#183; single entry point</text>
  </g>

  <g>
    <rect x="245" y="290" width="190" height="60" rx="4" fill="#e1f5ee" stroke="#0f6e56"/>
    <text x="340" y="313" text-anchor="middle" class="th" fill="#085041">Resilience filters</text>
    <text x="340" y="330" text-anchor="middle" class="ts" fill="#0f6e56">Rewrite, breaker, limiter, bulkhead</text>
  </g>

  <g>
    <rect x="140" y="410" width="190" height="60" rx="4" fill="#e1f5ee" stroke="#0f6e56"/>
    <text x="235" y="433" text-anchor="middle" class="th" fill="#085041">Downstream service</text>
    <text x="235" y="450" text-anchor="middle" class="ts" fill="#0f6e56">Handles the request</text>
  </g>

  <g>
    <rect x="350" y="410" width="190" height="60" rx="4" fill="#fcebeb" stroke="#a32d2d"/>
    <text x="445" y="433" text-anchor="middle" class="th" fill="#791f1f">/fallback</text>
    <text x="445" y="450" text-anchor="middle" class="ts" fill="#a32d2d">Checks failed</text>
  </g>

  <text x="175" y="398" class="ts" fill="#5f5e5a">checks pass</text>
  <text x="435" y="398" class="ts" fill="#5f5e5a">check fails</text>

  <text x="340" y="500" text-anchor="middle" class="ts" fill="#5f5e5a">Blue = gateway core &#183; Teal = normal flow &#183; Red = failure path &#183; Dashed = Zookeeper config</text>
</svg>
