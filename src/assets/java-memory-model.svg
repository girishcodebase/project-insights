<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Java runtime memory areas</title>
  <desc>The Heap holds objects, split into Young Generation (Eden, Survivor S0, Survivor S1) and Old Generation. Objects that survive several minor GCs in Young Gen get promoted to Old Gen. Each thread has its own Stack for method frames and local variables. Metaspace stores class metadata.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="400" height="220" rx="6" fill="none" stroke="#b4b2a9" stroke-dasharray="5 3"/>
  <text x="52" y="58" class="th" fill="#5f5e5a">Heap</text>

  <rect x="60" y="70" width="360" height="90" rx="6" fill="none" stroke="#b4b2a9" stroke-dasharray="4 3"/>
  <text x="72" y="88" class="ts" fill="#888780">Young Generation</text>

  <rect x="75" y="95" width="100" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="125" y="123" text-anchor="middle" class="th" fill="#0c447c">Eden</text>

  <rect x="190" y="95" width="105" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="242" y="123" text-anchor="middle" class="th" fill="#0c447c">Survivor S0</text>

  <rect x="310" y="95" width="105" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="362" y="123" text-anchor="middle" class="th" fill="#0c447c">Survivor S1</text>

  <rect x="75" y="180" width="340" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="245" y="205" text-anchor="middle" class="th" fill="#8a4200">Old Generation (Tenured)</text>
  <text x="245" y="222" text-anchor="middle" class="ts" fill="#b35a00">Long-lived objects</text>

  <rect x="470" y="70" width="150" height="80" rx="4" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="545" y="103" text-anchor="middle" class="th" fill="#085041">Stack</text>
  <text x="545" y="120" text-anchor="middle" class="ts" fill="#0f6e56">Per-thread frames</text>
  <text x="545" y="136" text-anchor="middle" class="ts" fill="#0f6e56">&amp; local vars</text>

  <rect x="470" y="180" width="150" height="60" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="545" y="205" text-anchor="middle" class="th" fill="#2c2c2a">Metaspace</text>
  <text x="545" y="222" text-anchor="middle" class="ts" fill="#5f5e5a">Class metadata</text>

  <path d="M362 145 L300 180" class="arr" marker-end="url(#arrow2)"/>
  <text x="300" y="168" class="ts" fill="#5f5e5a">survives GC</text>

  <text x="340" y="300" text-anchor="middle" class="ts" fill="#5f5e5a">Blue = Young Gen (Minor GC) &#183; Orange = Old Gen (Major/Full GC) &#183; Gray = native memory</text>
</svg>
