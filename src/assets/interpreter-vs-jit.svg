<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Interpreter and JIT compiler are siblings inside the Execution Engine</title>
  <desc>Bytecode enters the JVM's Execution Engine, which contains two separate, equal components: the Interpreter and the JIT Compiler — not one nested inside the other. The Interpreter translates and runs bytecode immediately every time, while also profiling call counts. Once a method is detected as hot, the JIT Compiler compiles that method to native machine code once and caches it. Interpreted execution and cached native code both ultimately run on the CPU, but future calls to a JIT-compiled method skip the interpreter entirely and run the cached native code directly.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="270" y="30" width="140" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="60" text-anchor="middle" class="th" fill="#2c2c2a">Bytecode</text>

  <line x1="340" y1="80" x2="340" y2="106" class="arr" marker-end="url(#arrow9)"/>

  <rect x="100" y="110" width="480" height="100" rx="6" fill="none" stroke="#b4b2a9" stroke-dasharray="5 3"/>
  <text x="112" y="128" class="ts" fill="#888780">Execution Engine (JVM)</text>

  <rect x="130" y="140" width="190" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="225" y="170" text-anchor="middle" class="th" fill="#0c447c">Interpreter</text>

  <rect x="360" y="140" width="190" height="50" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="455" y="170" text-anchor="middle" class="th" fill="#8a4200">JIT Compiler</text>

  <line x1="320" y1="165" x2="356" y2="165" class="arr" marker-end="url(#arrow9)"/>
  <text x="338" y="152" text-anchor="middle" class="ts" fill="#5f5e5a">hot?</text>

  <line x1="225" y1="190" x2="225" y2="256" class="arr" marker-end="url(#arrow9)"/>
  <line x1="455" y1="190" x2="455" y2="256" class="arr" marker-end="url(#arrow9)"/>

  <rect x="130" y="260" width="190" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="225" y="284" text-anchor="middle" class="th" fill="#0c447c">Executes now</text>
  <text x="225" y="301" text-anchor="middle" class="ts" fill="#185fa5">translated fresh each time</text>

  <rect x="360" y="260" width="190" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="455" y="284" text-anchor="middle" class="th" fill="#8a4200">Compiled once</text>
  <text x="455" y="301" text-anchor="middle" class="ts" fill="#b35a00">cached native code</text>

  <text x="560" y="285" class="ts" fill="#5f5e5a">&#8594; skips</text>
  <text x="560" y="301" class="ts" fill="#5f5e5a">Interpreter</text>
  <text x="560" y="317" class="ts" fill="#5f5e5a">next time</text>

  <line x1="255" y1="320" x2="310" y2="366" class="arr" marker-end="url(#arrow9)"/>
  <line x1="425" y1="320" x2="370" y2="366" class="arr" marker-end="url(#arrow9)"/>

  <rect x="250" y="370" width="180" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="392" text-anchor="middle" class="th" fill="#2c2c2a">CPU</text>
  <text x="340" y="409" text-anchor="middle" class="ts" fill="#5f5e5a">runs machine code</text>

  <text x="340" y="455" text-anchor="middle" class="ts" fill="#5f5e5a">Siblings inside the Execution Engine &#8212; JIT is not part of the Interpreter</text>
</svg>
