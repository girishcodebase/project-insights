<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>JDK, JRE, JVM and the compile-run flow</title>
  <desc>JDK contains JRE and dev tools like javac and jdb. JRE contains the JVM plus core libraries. Below, the flow: .java source is compiled by javac into .class bytecode, which the ClassLoader loads, and the Execution Engine (interpreter + JIT compiler) runs as native code.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="600" height="140" rx="6" fill="none" stroke="#b4b2a9" stroke-dasharray="5 3"/>
  <text x="52" y="58" class="th" fill="#5f5e5a">JDK</text>
  <text x="52" y="74" class="ts" fill="#888780">Development Kit</text>

  <rect x="70" y="70" width="430" height="90" rx="6" fill="none" stroke="#b4b2a9" stroke-dasharray="5 3"/>
  <text x="82" y="88" class="th" fill="#5f5e5a">JRE</text>
  <text x="82" y="104" class="ts" fill="#888780">Runtime Environment</text>

  <rect x="100" y="100" width="200" height="50" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="200" y="120" text-anchor="middle" class="th" fill="#8a4200">JVM</text>
  <text x="200" y="137" text-anchor="middle" class="ts" fill="#b35a00">Executes bytecode</text>

  <rect x="510" y="70" width="120" height="90" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="570" y="110" text-anchor="middle" class="th" fill="#2c2c2a">Dev Tools</text>
  <text x="570" y="127" text-anchor="middle" class="ts" fill="#5f5e5a">javac, jdb</text>

  <rect x="80" y="240" width="160" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="160" y="260" text-anchor="middle" class="th" fill="#0c447c">.java</text>
  <text x="160" y="277" text-anchor="middle" class="ts" fill="#185fa5">Source code</text>

  <rect x="260" y="240" width="160" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="260" text-anchor="middle" class="th" fill="#0c447c">javac</text>
  <text x="340" y="277" text-anchor="middle" class="ts" fill="#185fa5">Compiler</text>

  <rect x="440" y="240" width="160" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="520" y="260" text-anchor="middle" class="th" fill="#0c447c">.class</text>
  <text x="520" y="277" text-anchor="middle" class="ts" fill="#185fa5">Bytecode</text>

  <rect x="80" y="360" width="160" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="160" y="384" text-anchor="middle" class="th" fill="#8a4200">Native Code</text>
  <text x="160" y="401" text-anchor="middle" class="ts" fill="#b35a00">Runs on OS/CPU</text>

  <rect x="260" y="360" width="160" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="381" text-anchor="middle" class="th" fill="#8a4200">Execution Engine</text>
  <text x="340" y="398" text-anchor="middle" class="ts" fill="#b35a00">Interpreter + JIT</text>

  <rect x="440" y="360" width="160" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="520" y="384" text-anchor="middle" class="th" fill="#8a4200">ClassLoader</text>
  <text x="520" y="401" text-anchor="middle" class="ts" fill="#b35a00">Loads bytecode</text>

  <line x1="240" y1="265" x2="256" y2="265" class="arr" marker-end="url(#arrow)"/>
  <line x1="420" y1="265" x2="436" y2="265" class="arr" marker-end="url(#arrow)"/>
  <line x1="440" y1="390" x2="424" y2="390" class="arr" marker-end="url(#arrow)"/>
  <line x1="260" y1="390" x2="244" y2="390" class="arr" marker-end="url(#arrow)"/>
  <line x1="520" y1="290" x2="520" y2="356" class="arr" marker-end="url(#arrow)"/>

  <text x="340" y="445" text-anchor="middle" class="ts" fill="#5f5e5a">Blue = compile-time &#183; Orange = runtime (JVM)</text>
</svg>
