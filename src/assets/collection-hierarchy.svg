<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Java Collections Framework hierarchy</title>
  <desc>Iterable is the root interface. Collection extends Iterable. List, Set, and Queue extend Collection. Map is a separate hierarchy that does not extend Collection, since it stores key-value pairs instead of single elements.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="260" y="40" width="160" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="70" text-anchor="middle" class="th" fill="#2c2c2a">Iterable</text>

  <rect x="260" y="130" width="160" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="160" text-anchor="middle" class="th" fill="#2c2c2a">Collection</text>

  <rect x="95" y="220" width="150" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="170" y="244" text-anchor="middle" class="th" fill="#0c447c">List</text>
  <text x="170" y="261" text-anchor="middle" class="ts" fill="#185fa5">ArrayList, LinkedList</text>

  <rect x="265" y="220" width="150" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="244" text-anchor="middle" class="th" fill="#0c447c">Set</text>
  <text x="340" y="261" text-anchor="middle" class="ts" fill="#185fa5">HashSet, TreeSet</text>

  <rect x="435" y="220" width="150" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="510" y="244" text-anchor="middle" class="th" fill="#0c447c">Queue</text>
  <text x="510" y="261" text-anchor="middle" class="ts" fill="#185fa5">ArrayDeque, PriorityQueue</text>

  <rect x="265" y="320" width="150" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="344" text-anchor="middle" class="th" fill="#8a4200">Map</text>
  <text x="340" y="361" text-anchor="middle" class="ts" fill="#b35a00">HashMap, TreeMap</text>

  <line x1="340" y1="90" x2="340" y2="126" class="arr" marker-end="url(#arrow3)"/>
  <path d="M340 180 L170 220" class="arr" marker-end="url(#arrow3)"/>
  <line x1="340" y1="180" x2="340" y2="216" class="arr" marker-end="url(#arrow3)"/>
  <path d="M340 180 L510 220" class="arr" marker-end="url(#arrow3)"/>

  <text x="440" y="310" text-anchor="middle" class="ts" fill="#5f5e5a">Map does NOT extend Collection</text>
</svg>
