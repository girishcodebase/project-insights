<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Java exception hierarchy</title>
  <desc>Throwable is the root, splitting into Error (serious JVM problems, don't catch) and Exception. Exception splits into checked exceptions like IOException and SQLException, and RuntimeException, whose subclasses like NullPointerException are unchecked.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="260" y="40" width="160" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="70" text-anchor="middle" class="th" fill="#2c2c2a">Throwable</text>

  <rect x="95" y="130" width="180" height="60" rx="4" fill="#fcebeb" stroke="#a32d2d"/>
  <text x="185" y="154" text-anchor="middle" class="th" fill="#791f1f">Error</text>
  <text x="185" y="171" text-anchor="middle" class="ts" fill="#a32d2d">Don't catch these</text>

  <rect x="405" y="130" width="180" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="495" y="154" text-anchor="middle" class="th" fill="#0c447c">Exception</text>
  <text x="495" y="171" text-anchor="middle" class="ts" fill="#185fa5">Checked by default</text>

  <rect x="60" y="230" width="220" height="60" rx="4" fill="#fcebeb" stroke="#a32d2d"/>
  <text x="170" y="254" text-anchor="middle" class="th" fill="#791f1f">OutOfMemoryError</text>
  <text x="170" y="271" text-anchor="middle" class="ts" fill="#a32d2d">StackOverflowError</text>

  <rect x="320" y="230" width="150" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="395" y="254" text-anchor="middle" class="th" fill="#0c447c">IOException</text>
  <text x="395" y="271" text-anchor="middle" class="ts" fill="#185fa5">SQLException</text>

  <rect x="490" y="230" width="150" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="565" y="250" text-anchor="middle" class="th" fill="#8a4200">RuntimeException</text>
  <text x="565" y="267" text-anchor="middle" class="ts" fill="#b35a00">Unchecked</text>
  <text x="565" y="282" text-anchor="middle" class="ts" fill="#b35a00">NullPointerException</text>

  <line x1="340" y1="90" x2="220" y2="130" class="arr" marker-end="url(#arrow6)"/>
  <line x1="340" y1="90" x2="460" y2="130" class="arr" marker-end="url(#arrow6)"/>
  <line x1="185" y1="190" x2="185" y2="226" class="arr" marker-end="url(#arrow6)"/>
  <line x1="460" y1="190" x2="410" y2="226" class="arr" marker-end="url(#arrow6)"/>
  <line x1="530" y1="190" x2="555" y2="226" class="arr" marker-end="url(#arrow6)"/>

  <text x="340" y="310" text-anchor="middle" class="ts" fill="#5f5e5a">Blue = checked (compiler-enforced) &#183; Orange = unchecked (RuntimeException) &#183; Red = Error</text>
</svg>
