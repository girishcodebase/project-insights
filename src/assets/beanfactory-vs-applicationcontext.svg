<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BeanFactory vs ApplicationContext</title>
  <desc>BeanFactory is the root IoC container interface, providing basic dependency injection with lazy singleton initialization. ApplicationContext extends BeanFactory, adding eager singleton initialization at startup, event publishing, internationalization, and AOP integration. Spring Boot and virtually all modern applications use ApplicationContext.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowF" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="240" y="30" width="200" height="60" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="54" text-anchor="middle" class="th" fill="#2c2c2a">BeanFactory</text>
  <text x="340" y="71" text-anchor="middle" class="ts" fill="#5f5e5a">root interface, lazy init</text>

  <line x1="340" y1="90" x2="340" y2="126" class="arr" marker-end="url(#arrowF)"/>
  <text x="375" y="112" class="ts" fill="#5f5e5a">extends</text>

  <rect x="170" y="130" width="340" height="90" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="155" text-anchor="middle" class="th" fill="#8a4200">ApplicationContext</text>
  <text x="340" y="174" text-anchor="middle" class="ts" fill="#b35a00">+ eager singleton init at startup</text>
  <text x="340" y="191" text-anchor="middle" class="ts" fill="#b35a00">+ events, i18n, AOP integration</text>
  <text x="340" y="208" text-anchor="middle" class="ts" fill="#b35a00">used by Spring Boot</text>

  <text x="340" y="245" text-anchor="middle" class="ts" fill="#5f5e5a">In practice: always use ApplicationContext, not raw BeanFactory</text>
</svg>
