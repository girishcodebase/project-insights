<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Spring Boot property source precedence</title>
  <desc>When the same property is set in multiple places, the highest one in this stack wins. From highest to lowest priority: command-line arguments, environment variables, profile-specific application yml files, the base application yml file, and PropertySource or code defaults.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="190" y="40" width="300" height="46" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="68" text-anchor="middle" class="th" fill="#8a4200">Command-line arguments</text>

  <rect x="190" y="96" width="300" height="46" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="124" text-anchor="middle" class="th" fill="#8a4200">Environment variables</text>

  <rect x="190" y="152" width="300" height="46" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="180" text-anchor="middle" class="th" fill="#0c447c">application-{profile}.yml</text>

  <rect x="190" y="208" width="300" height="46" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="236" text-anchor="middle" class="th" fill="#0c447c">application.yml</text>

  <rect x="190" y="264" width="300" height="46" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="292" text-anchor="middle" class="th" fill="#2c2c2a">@PropertySource / code defaults</text>

  <line x1="530" y1="300" x2="530" y2="40" class="arr" marker-end="url(#arrowD)"/>
  <text x="565" y="70" class="ts" fill="#5f5e5a">higher</text>
  <text x="565" y="86" class="ts" fill="#5f5e5a">priority</text>

  <text x="340" y="335" text-anchor="middle" class="ts" fill="#5f5e5a">Same property set in two places? The one higher in this stack wins.</text>
</svg>
