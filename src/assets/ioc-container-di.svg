<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>IoC container creating and wiring beans</title>
  <desc>Bean definitions from annotations like Component and Bean methods go into the IoC container, which creates instances and wires them together, producing fully wired objects. Below, a concrete example: the container injects UserRepository into UserService, and UserService into UserController, via constructor injection, without any of these classes calling new on their dependencies.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30" y="40" width="190" height="60" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="125" y="64" text-anchor="middle" class="th" fill="#2c2c2a">Bean Definitions</text>
  <text x="125" y="81" text-anchor="middle" class="ts" fill="#5f5e5a">@Component, @Bean...</text>

  <rect x="250" y="40" width="180" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="64" text-anchor="middle" class="th" fill="#8a4200">IoC Container</text>
  <text x="340" y="81" text-anchor="middle" class="ts" fill="#b35a00">ApplicationContext</text>

  <rect x="460" y="40" width="190" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="555" y="64" text-anchor="middle" class="th" fill="#0c447c">Wired Objects</text>
  <text x="555" y="81" text-anchor="middle" class="ts" fill="#185fa5">ready to use</text>

  <line x1="220" y1="70" x2="246" y2="70" class="arr" marker-end="url(#arrowB)"/>
  <line x1="430" y1="70" x2="456" y2="70" class="arr" marker-end="url(#arrowB)"/>

  <rect x="30" y="170" width="180" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="120" y="200" text-anchor="middle" class="th" fill="#0c447c">UserController</text>

  <rect x="250" y="170" width="180" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="200" text-anchor="middle" class="th" fill="#0c447c">UserService</text>

  <rect x="470" y="170" width="180" height="50" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="560" y="200" text-anchor="middle" class="th" fill="#0c447c">UserRepository</text>

  <line x1="210" y1="195" x2="246" y2="195" class="arr" marker-end="url(#arrowB)"/>
  <line x1="430" y1="195" x2="466" y2="195" class="arr" marker-end="url(#arrowB)"/>
  <text x="228" y="188" text-anchor="middle" class="ts" fill="#5f5e5a">depends on</text>
  <text x="448" y="188" text-anchor="middle" class="ts" fill="#5f5e5a">depends on</text>

  <text x="340" y="245" text-anchor="middle" class="ts" fill="#5f5e5a">The container injects each dependency automatically — no class ever calls "new" on its own collaborators</text>
</svg>
