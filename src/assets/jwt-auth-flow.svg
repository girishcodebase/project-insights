<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>JWT authentication flow</title>
  <desc>The client sends login credentials, the server validates them and generates a JWT, and the client stores that token. On every later request, the client sends the token in the Authorization header, a JWT filter validates it and sets the security context, and the controller then executes with the request treated as authenticated.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowE" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="150" y="30" text-anchor="middle" class="ts" fill="#888780">Step 1 &#8212; Login (once)</text>

  <rect x="50" y="50" width="180" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="140" y="73" text-anchor="middle" class="th" fill="#2c2c2a">Client sends login</text>
  <text x="140" y="90" text-anchor="middle" class="ts" fill="#5f5e5a">username + password</text>

  <rect x="250" y="50" width="200" height="55" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="350" y="73" text-anchor="middle" class="th" fill="#0c447c">Server validates &amp;</text>
  <text x="350" y="90" text-anchor="middle" class="ts" fill="#185fa5">generates JWT</text>

  <rect x="470" y="50" width="160" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="550" y="73" text-anchor="middle" class="th" fill="#2c2c2a">Client stores</text>
  <text x="550" y="90" text-anchor="middle" class="ts" fill="#5f5e5a">the token</text>

  <line x1="230" y1="77" x2="246" y2="77" class="arr" marker-end="url(#arrowE)"/>
  <line x1="450" y1="77" x2="466" y2="77" class="arr" marker-end="url(#arrowE)"/>

  <path d="M550,105 L550,135 L140,135 L140,166" class="arr" marker-end="url(#arrowE)"/>

  <text x="150" y="185" text-anchor="middle" class="ts" fill="#888780">Step 2 &#8212; Every later request</text>

  <rect x="50" y="200" width="220" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="160" y="223" text-anchor="middle" class="th" fill="#2c2c2a">Client sends request</text>
  <text x="160" y="240" text-anchor="middle" class="ts" fill="#5f5e5a">Authorization: Bearer &lt;token&gt;</text>

  <rect x="290" y="200" width="180" height="55" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="380" y="223" text-anchor="middle" class="th" fill="#8a4200">JWT Filter</text>
  <text x="380" y="240" text-anchor="middle" class="ts" fill="#b35a00">validates token</text>

  <rect x="490" y="200" width="150" height="55" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="565" y="223" text-anchor="middle" class="th" fill="#0c447c">Controller</text>
  <text x="565" y="240" text-anchor="middle" class="ts" fill="#185fa5">runs (authenticated)</text>

  <line x1="270" y1="227" x2="286" y2="227" class="arr" marker-end="url(#arrowE)"/>
  <line x1="470" y1="227" x2="486" y2="227" class="arr" marker-end="url(#arrowE)"/>

  <text x="340" y="295" text-anchor="middle" class="ts" fill="#5f5e5a">Stateless &#8212; the server keeps no session; each request's token proves identity on its own</text>
</svg>
