<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>HashMap internal working</title>
  <desc>A key's hashCode is spread and reduced to a bucket index using hash and (capacity - 1). HashMap stores an array of buckets; each bucket holds a linked list of entries that collided into the same index. If a bucket's chain grows past 8 entries and the table is large enough, Java treeifies it into a red-black tree for faster lookup.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="50" y="40" width="180" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="140" y="60" text-anchor="middle" class="th" fill="#2c2c2a">key.hashCode()</text>
  <text x="140" y="77" text-anchor="middle" class="ts" fill="#5f5e5a">e.g. "abc".hashCode()</text>

  <rect x="250" y="40" width="180" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="60" text-anchor="middle" class="th" fill="#2c2c2a">Hash spreading</text>
  <text x="340" y="77" text-anchor="middle" class="ts" fill="#5f5e5a">h ^ (h &gt;&gt;&gt; 16)</text>

  <rect x="450" y="40" width="180" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="540" y="60" text-anchor="middle" class="th" fill="#2c2c2a">Bucket index</text>
  <text x="540" y="77" text-anchor="middle" class="ts" fill="#5f5e5a">hash &amp; (n - 1)</text>

  <line x1="230" y1="65" x2="246" y2="65" class="arr" marker-end="url(#arrow5)"/>
  <line x1="430" y1="65" x2="446" y2="65" class="arr" marker-end="url(#arrow5)"/>

  <rect x="47" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="81" y="180" text-anchor="middle" class="ts" fill="#888780">0</text>
  <rect x="121" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="155" y="180" text-anchor="middle" class="ts" fill="#888780">1</text>
  <rect x="195" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="229" y="180" text-anchor="middle" class="ts" fill="#888780">2</text>
  <rect x="269" y="150" width="68" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="303" y="180" text-anchor="middle" class="th" fill="#0c447c">3</text>
  <rect x="343" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="377" y="180" text-anchor="middle" class="ts" fill="#888780">4</text>
  <rect x="417" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="451" y="180" text-anchor="middle" class="ts" fill="#888780">5</text>
  <rect x="491" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="525" y="180" text-anchor="middle" class="ts" fill="#888780">6</text>
  <rect x="565" y="150" width="68" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="599" y="180" text-anchor="middle" class="ts" fill="#888780">7</text>

  <line x1="303" y1="200" x2="303" y2="226" class="arr" marker-end="url(#arrow5)"/>

  <rect x="243" y="230" width="120" height="36" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="303" y="253" text-anchor="middle" class="ts" fill="#0c447c">Entry A (key1)</text>

  <line x1="363" y1="248" x2="393" y2="248" class="arr" marker-end="url(#arrow5)"/>

  <rect x="397" y="230" width="120" height="36" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="457" y="253" text-anchor="middle" class="ts" fill="#0c447c">Entry B (key2)</text>

  <text x="340" y="300" text-anchor="middle" class="ts" fill="#5f5e5a">Collision &#8594; linked list &#183; treeified into a red-black tree if chain &#8805; 8 &amp; table &#8805; 64</text>
</svg>
