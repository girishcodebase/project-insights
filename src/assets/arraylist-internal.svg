<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ArrayList internal working</title>
  <desc>ArrayList is backed by a plain Object array. When the array is full and a new element is added, a bigger array (roughly 1.5 times the capacity) is allocated and the old elements are copied into it using Arrays.copyOf.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="149" y="60" width="70" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="184" y="90" text-anchor="middle" class="th" fill="#0c447c">0</text>
  <rect x="227" y="60" width="70" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="262" y="90" text-anchor="middle" class="th" fill="#0c447c">1</text>
  <rect x="305" y="60" width="70" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="90" text-anchor="middle" class="th" fill="#0c447c">2</text>
  <rect x="383" y="60" width="70" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="418" y="90" text-anchor="middle" class="th" fill="#0c447c">3</text>
  <rect x="461" y="60" width="70" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <text x="496" y="90" text-anchor="middle" class="th" fill="#888780">empty</text>

  <text x="340" y="135" text-anchor="middle" class="ts" fill="#5f5e5a">size = 4, capacity = 5 (full)</text>

  <line x1="340" y1="150" x2="340" y2="186" class="arr" marker-end="url(#arrow4)"/>
  <text x="340" y="170" text-anchor="middle" class="ts" fill="#5f5e5a">add() &#8594; resize &#215;1.5, copy via Arrays.copyOf()</text>

  <rect x="79" y="200" width="60" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="109" y="230" text-anchor="middle" class="th" fill="#0c447c">0</text>
  <rect x="145" y="200" width="60" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="175" y="230" text-anchor="middle" class="th" fill="#0c447c">1</text>
  <rect x="211" y="200" width="60" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="241" y="230" text-anchor="middle" class="th" fill="#0c447c">2</text>
  <rect x="277" y="200" width="60" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="307" y="230" text-anchor="middle" class="th" fill="#0c447c">3</text>
  <rect x="343" y="200" width="60" height="50" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="373" y="230" text-anchor="middle" class="th" fill="#0c447c">4</text>
  <rect x="409" y="200" width="60" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <rect x="475" y="200" width="60" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>
  <rect x="541" y="200" width="60" height="50" fill="none" stroke="#b4b2a9" stroke-dasharray="3 3"/>

  <text x="340" y="275" text-anchor="middle" class="ts" fill="#5f5e5a">size = 5, capacity = 8</text>

  <text x="340" y="315" text-anchor="middle" class="ts" fill="#5f5e5a">get(i) is O(1) &#183; add/remove in the middle is O(n) (shifts elements)</text>
</svg>
