<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Spring bean lifecycle</title>
  <desc>A bean's constructor is called, then its dependencies are injected, then its PostConstruct or afterPropertiesSet method runs, then the bean is ready to use for the life of the application. When the application shuts down, the bean's PreDestroy or destroy method runs for cleanup.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="50" y="60" width="180" height="55" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="140" y="85" text-anchor="middle" class="th" fill="#0c447c">Constructor called</text>
  <text x="140" y="102" text-anchor="middle" class="ts" fill="#185fa5">instance created</text>

  <rect x="250" y="60" width="180" height="55" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="85" text-anchor="middle" class="th" fill="#0c447c">Dependencies</text>
  <text x="340" y="102" text-anchor="middle" class="ts" fill="#185fa5">injected (DI)</text>

  <rect x="450" y="60" width="180" height="55" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="540" y="85" text-anchor="middle" class="th" fill="#0c447c">@PostConstruct</text>
  <text x="540" y="102" text-anchor="middle" class="ts" fill="#185fa5">/ afterPropertiesSet()</text>

  <line x1="230" y1="87" x2="246" y2="87" class="arr" marker-end="url(#arrowC)"/>
  <line x1="430" y1="87" x2="446" y2="87" class="arr" marker-end="url(#arrowC)"/>

  <path d="M540,115 L540,145 L170,145 L170,216" class="arr" marker-end="url(#arrowC)"/>

  <rect x="70" y="220" width="200" height="55" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="170" y="245" text-anchor="middle" class="th" fill="#8a4200">Bean ready</text>
  <text x="170" y="262" text-anchor="middle" class="ts" fill="#b35a00">in use for the app's life</text>

  <line x1="270" y1="247" x2="326" y2="247" class="arr" marker-end="url(#arrowC)"/>
  <text x="298" y="238" text-anchor="middle" class="ts" fill="#5f5e5a">app runs...</text>

  <rect x="330" y="220" width="280" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="470" y="245" text-anchor="middle" class="th" fill="#2c2c2a">@PreDestroy / destroy()</text>
  <text x="470" y="262" text-anchor="middle" class="ts" fill="#5f5e5a">on container shutdown</text>

  <text x="340" y="305" text-anchor="middle" class="ts" fill="#5f5e5a">Annotation hooks (@PostConstruct/@PreDestroy) or interfaces (InitializingBean/DisposableBean) — same lifecycle</text>
</svg>
