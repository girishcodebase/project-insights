<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How Spring Data JPA, JPA, Hibernate, and JDBC connect</title>
  <desc>Spring Data JPA sits on top of JPA, which is a specification, not an implementation. JPA is implemented by a provider, most commonly Hibernate, which is the actual ORM engine. Hibernate generates SQL and executes it through JDBC, the low-level Java database API, which talks to the actual database.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="150" y="40" width="380" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="340" y="64" text-anchor="middle" class="th" fill="#0c447c">Spring Data JPA</text>
  <text x="340" y="81" text-anchor="middle" class="ts" fill="#185fa5">JpaRepository&lt;T, ID&gt; — no boilerplate DAO code</text>

  <line x1="340" y1="100" x2="340" y2="126" class="arr" marker-end="url(#arrowG)"/>
  <text x="545" y="118" text-anchor="middle" class="ts" fill="#5f5e5a">built on top of</text>

  <rect x="150" y="130" width="380" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="154" text-anchor="middle" class="th" fill="#8a4200">JPA (Jakarta Persistence API)</text>
  <text x="340" y="171" text-anchor="middle" class="ts" fill="#b35a00">a specification: @Entity, EntityManager, JPQL</text>

  <line x1="340" y1="190" x2="340" y2="216" class="arr" marker-end="url(#arrowG)"/>
  <text x="545" y="208" text-anchor="middle" class="ts" fill="#5f5e5a">implemented by</text>

  <rect x="150" y="220" width="380" height="60" rx="4" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="340" y="244" text-anchor="middle" class="th" fill="#085041">Hibernate</text>
  <text x="340" y="261" text-anchor="middle" class="ts" fill="#0f6e56">the most common JPA provider — the real ORM engine</text>

  <line x1="340" y1="280" x2="340" y2="306" class="arr" marker-end="url(#arrowG)"/>
  <text x="545" y="298" text-anchor="middle" class="ts" fill="#5f5e5a">generates SQL, runs via</text>

  <rect x="150" y="310" width="380" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="333" text-anchor="middle" class="th" fill="#2c2c2a">JDBC</text>
  <text x="340" y="350" text-anchor="middle" class="ts" fill="#5f5e5a">low-level Java database API</text>

  <line x1="340" y1="365" x2="340" y2="391" class="arr" marker-end="url(#arrowG)"/>

  <rect x="150" y="395" width="380" height="55" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="418" text-anchor="middle" class="th" fill="#2c2c2a">Database</text>
  <text x="340" y="435" text-anchor="middle" class="ts" fill="#5f5e5a">Oracle, MySQL, Postgres...</text>

  <text x="340" y="475" text-anchor="middle" class="ts" fill="#5f5e5a">ORM = the general pattern (objects &#8596; tables). JPA = Java's standard for it. Hibernate = its most common implementation.</text>
</svg>
