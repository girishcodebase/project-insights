<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Spring Boot application startup flow</title>
  <desc>main() calls SpringApplication.run(), which triggers component scanning, auto-configuration based on the classpath, and embedded server startup in parallel. These feed into the ApplicationContext, the IoC container that creates and wires all beans, after which the application is running and ready to serve requests.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
    .arr { stroke: #999; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="170" y="40" width="340" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="63" text-anchor="middle" class="th" fill="#2c2c2a">main()</text>
  <text x="340" y="80" text-anchor="middle" class="ts" fill="#5f5e5a">calls SpringApplication.run(App.class, args)</text>

  <line x1="150" y1="130" x2="330" y2="90" class="arr" marker-end="url(#arrowA)"/>
  <line x1="340" y1="90" x2="340" y2="126" class="arr" marker-end="url(#arrowA)"/>
  <line x1="530" y1="130" x2="350" y2="90" class="arr" marker-end="url(#arrowA)"/>

  <rect x="60" y="130" width="180" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="150" y="155" text-anchor="middle" class="th" fill="#0c447c">Component Scan</text>
  <text x="150" y="172" text-anchor="middle" class="ts" fill="#185fa5">finds @Component, @Service...</text>

  <rect x="260" y="130" width="180" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="350" y="155" text-anchor="middle" class="th" fill="#0c447c">Auto-Configuration</text>
  <text x="350" y="172" text-anchor="middle" class="ts" fill="#185fa5">based on the classpath</text>

  <rect x="460" y="130" width="160" height="60" rx="4" fill="#e6f1fb" stroke="#185fa5"/>
  <text x="540" y="155" text-anchor="middle" class="th" fill="#0c447c">Embedded Server</text>
  <text x="540" y="172" text-anchor="middle" class="ts" fill="#185fa5">Tomcat starts</text>

  <line x1="150" y1="190" x2="300" y2="230" class="arr" marker-end="url(#arrowA)"/>
  <line x1="340" y1="190" x2="340" y2="226" class="arr" marker-end="url(#arrowA)"/>
  <line x1="540" y1="190" x2="390" y2="230" class="arr" marker-end="url(#arrowA)"/>

  <rect x="190" y="230" width="300" height="60" rx="4" fill="#fdece0" stroke="#e76f00"/>
  <text x="340" y="254" text-anchor="middle" class="th" fill="#8a4200">ApplicationContext</text>
  <text x="340" y="271" text-anchor="middle" class="ts" fill="#b35a00">IoC container — beans created &amp; wired</text>

  <line x1="340" y1="290" x2="340" y2="326" class="arr" marker-end="url(#arrowA)"/>

  <rect x="240" y="330" width="200" height="50" rx="4" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="340" y="360" text-anchor="middle" class="th" fill="#2c2c2a">App running :8080</text>

  <text x="340" y="410" text-anchor="middle" class="ts" fill="#5f5e5a">e.g. spring-boot-starter-web on the classpath &#8594; auto-configures Spring MVC + embedded Tomcat</text>
</svg>
